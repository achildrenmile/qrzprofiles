name: Update OERadio Feed Widget

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate feed widget HTML
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import html
          import re
          from datetime import datetime

          RSS_URL = "https://oeradio.at/en/feed/"
          MAX_ITEMS = 6

          try:
              req = urllib.request.Request(RSS_URL, headers={"User-Agent": "Mozilla/5.0 OERadio-Feed-Bot"})
              with urllib.request.urlopen(req, timeout=30) as resp:
                  feed_data = resp.read().decode("utf-8")
          except Exception as e:
              print(f"Failed to fetch feed: {e}")
              exit(1)

          try:
              root = ET.fromstring(feed_data)
          except ET.ParseError as e:
              print(f"Failed to parse XML: {e}")
              exit(1)

          items = root.findall(".//item")[:MAX_ITEMS]
          if not items:
              print("No items found in feed")
              exit(1)

          parts = []
          parts.append('<!DOCTYPE html>')
          parts.append('<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>')
          parts.append('<body style="margin:0;padding:1rem;font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#f1f5f9;font-size:0.9rem;line-height:1.6">')

          for i, item in enumerate(items):
              title_el = item.find("title")
              link_el = item.find("link")
              pubdate_el = item.find("pubDate")
              desc_el = item.find("description")

              title = html.escape(title_el.text or "") if title_el is not None else ""
              link = html.escape(link_el.text or "") if link_el is not None else ""

              date_str = ""
              if pubdate_el is not None and pubdate_el.text:
                  try:
                      dt = datetime.strptime(pubdate_el.text.strip(), "%a, %d %b %Y %H:%M:%S %z")
                      date_str = dt.strftime("%b %d, %Y")
                  except ValueError:
                      date_str = pubdate_el.text

              desc = ""
              if desc_el is not None and desc_el.text:
                  d = re.sub(r"<[^>]+>", "", desc_el.text)
                  d = html.unescape(d)
                  d = re.sub(r"\s+", " ", d).strip()
                  if len(d) > 150:
                      d = d[:150] + "..."
                  d = d.replace("&", "&#38;").replace('"', "&#34;").replace("'", "&#8217;").replace("<", "&lt;").replace(">", "&gt;")
                  d = d.replace("\u2013", "&#8211;").replace("\u2014", "&#8212;").replace("\u201c", "&#8220;").replace("\u201d", "&#8221;")
                  desc = d

              title_safe = title.replace("\u2013", "&#8211;").replace("\u2014", "&#8212;").replace("\\!", "!").replace("'", "&#8217;")

              border = "border-bottom:1px solid #334155;" if i < len(items) - 1 else ""

              parts.append(f'<div style="margin-bottom:1.5rem;padding-bottom:1.5rem;{border}">')
              parts.append(f'<div style="margin-bottom:0.5rem"><a href="{link}" target="_blank" style="color:#3b82f6;text-decoration:none;font-weight:600;font-size:0.95rem">{title_safe}</a></div>')
              parts.append(f'<div style="color:#64748b;font-size:0.75rem;margin-bottom:0.5rem">{date_str}</div>')
              parts.append(f'<div style="color:#94a3b8;font-size:0.85rem;line-height:1.5">{desc}</div>')
              parts.append('</div>')

          parts.append('</body></html>')

          with open("docs/feed-widget.html", "w", encoding="utf-8") as f:
              f.write("\n".join(parts))
          print(f"Generated docs/feed-widget.html with {len(items)} items")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed-widget.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update OERadio feed widget"
            git push
          fi
